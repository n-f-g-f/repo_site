<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Player League Leaders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg:#0f172a; --panel:#111827; --panel-2:#1f2937; --text:#e5e7eb; --muted:#94a3b8; --line:#334155; --accent:#38bdf8;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial, Helvetica, sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:1800px; margin:0 auto; padding:18px; }
    h1 { margin:0 0 6px 0; font-size:24px; }
    .subtitle { color:var(--muted); margin-bottom:14px; font-size:13px; }
    .toolbar { display:grid; grid-template-columns:repeat(5, minmax(0, 1fr)); gap:10px; align-items:end; margin-bottom:14px; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:12px; }
    .control { display:flex; flex-direction:column; gap:4px; min-width:0; }
    .control label { font-size:12px; color:var(--muted); }
    .control select, .control input { background:#0b1220; color:var(--text); border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:13px; }
    .qualification { color:var(--muted); font-size:12px; align-self:center; }
    .section-grid { display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:14px; margin-bottom:14px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; overflow:hidden; }
    .card-head { padding:14px 16px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; gap:10px; align-items:center; }
    .card-title { font-size:18px; font-weight:700; }
    .card-sub { font-size:12px; color:var(--muted); }
    .card-body { padding:14px 16px; }
    .table-wrap { overflow:auto; }
    table { width:100%; border-collapse:collapse; min-width:640px; }
    th, td { padding:10px 12px; border-bottom:1px solid var(--line); font-size:13px; white-space:nowrap; text-align:right; }
    th:first-child, td:first-child, th:nth-child(2), td:nth-child(2) { text-align:left; }
    thead th { background:var(--panel-2); position:sticky; top:0; z-index:1; }
    .player-link { color:inherit; text-decoration:none; }
    .player-link:hover { text-decoration:underline; }
    .player-cell { display:flex; align-items:center; gap:10px; }
    .player-avatar { width:32px; height:32px; border-radius:50%; overflow:hidden; background:#0b1220; border:1px solid var(--line); flex:0 0 auto; display:inline-flex; align-items:center; justify-content:center; }
    .player-avatar img { width:100%; height:100%; object-fit:cover; display:block; }
    .player-avatar-empty { color:var(--muted); font-size:12px; font-weight:700; }
    .player-main { font-weight:700; color:var(--text); line-height:1.1; }
    .player-sub { font-size:12px; color:var(--muted); margin-top:2px; }
    .rank-pill { display:inline-flex; align-items:center; justify-content:center; min-width:30px; height:26px; border-radius:999px; background:#0b1220; border:1px solid var(--line); font-weight:700; }
    .tag-row { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
    .tag { display:inline-flex; align-items:center; padding:4px 8px; border-radius:999px; background:#0b1220; border:1px solid var(--line); font-size:11px; color:var(--muted); }
    .discover-grid { display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:12px; }
    .discover-card { background:#0b1220; border:1px solid var(--line); border-radius:14px; padding:12px; }
    .discover-card a { color:inherit; text-decoration:none; }
    .discover-card a:hover .player-main { color:var(--accent); }
    .empty { color:var(--muted); font-size:13px; }
    @media (max-width: 1300px) { .section-grid,.discover-grid,.toolbar { grid-template-columns:1fr 1fr; } }
    @media (max-width: 900px) { .section-grid,.discover-grid,.toolbar { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Player League Leaders</h1>
    <div class="subtitle">Explore leaders by profile, then jump straight into the Player Hubs worth opening next.</div>

    <div class="toolbar">
      <div class="control">
        <label for="group-filter">Section</label>
        <select id="group-filter"></select>
      </div>
      <div class="control">
        <label for="regular-filter">Regular Stats</label>
        <select id="regular-filter"></select>
      </div>
      <div class="control">
        <label for="advanced-filter">Advanced Stats</label>
        <select id="advanced-filter"></select>
      </div>
      <div class="control">
        <label for="impact-filter">Per40 / On-Off</label>
        <select id="impact-filter"></select>
      </div>
      <div class="control">
        <label for="team-filter">Team</label>
        <select id="team-filter"></select>
      </div>
      <div class="control">
        <label for="position-filter">Position</label>
        <select id="position-filter"></select>
      </div>
      <div class="control">
        <label for="minutes-filter">Min MPG</label>
        <input id="minutes-filter" type="number" min="0" step="1" value="0">
      </div>
      <div class="qualification" id="qualification-text"></div>
    </div>

    <div class="section-grid" id="leaders-grid"></div>

    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-title">Players You Should Open Next</div>
          <div class="card-sub">Discovery layer built from the current leader filters.</div>
        </div>
      </div>
      <div class="card-body" id="discover-panel"></div>
    </div>
  </div>

  <script>
    const DATA_URL = "data/player_league_leaders_data.json";
    let DATASET = null;

    function escapeHtml(text) { return String(text ?? "").replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); }
    function fmtNumber(value) { return (value === null || value === undefined || Number.isNaN(value)) ? '' : Number(value).toFixed(1); }

    function playerCellHtml(row) {
      const name = escapeHtml(row.player_name || '');
      const sub = [row.team_key || '', row.playing_position || ''].filter(Boolean).join(' · ');
      const avatar = row.photo_relpath
        ? `<span class="player-avatar"><img src="../${escapeHtml(row.photo_relpath)}" alt="${name}"></span>`
        : `<span class="player-avatar player-avatar-empty">?</span>`;
      const inner = `<div><div class="player-main">${name}</div><div class="player-sub">${escapeHtml(sub)}</div></div>`;
      const content = `<div class="player-cell">${avatar}${inner}</div>`;
      return row.player_hub_href ? `<a class="player-link" href="${escapeHtml(row.player_hub_href)}">${content}</a>` : content;
    }

    function buildCategoryCard(cat) {
      const rows = (cat.filtered_rows || []).map(row => `
        <tr>
          <td><span class="rank-pill">${row.rank}</span></td>
          <td>${playerCellHtml(row)}</td>
          <td>${row.games ?? ''}</td>
          <td>${fmtNumber(row.mpg)}</td>
          <td>${escapeHtml(row.value_text || '')}</td>
        </tr>
      `).join('');
      return `
        <div class="card">
          <div class="card-head">
            <div>
              <div class="card-title">${escapeHtml(cat.title)}</div>
              <div class="card-sub">${escapeHtml(cat.qualification_text || '')}</div>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>#</th><th>Player</th><th>G</th><th>MPG</th><th>Leader Value</th></tr>
              </thead>
              <tbody>${rows || `<tr><td colspan="5" class="empty">No players match the current filters.</td></tr>`}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    function passesFilters(row, state) {
      if (state.team && row.team_key !== state.team) return false;
      if (state.position && row.playing_position !== state.position) return false;
      if (Number(row.mpg || 0) < Number(state.minMinutes || 0)) return false;
      return true;
    }

    function getState() {
      return {
        group: document.getElementById('group-filter').value || '',
        regular: document.getElementById('regular-filter').value || '',
        advanced: document.getElementById('advanced-filter').value || '',
        impact: document.getElementById('impact-filter').value || '',
        team: document.getElementById('team-filter').value || '',
        position: document.getElementById('position-filter').value || '',
        minMinutes: Number(document.getElementById('minutes-filter').value || 0),
      };
    }

    function currentGroup(state) {
      const groups = DATASET?.groups || [];
      return groups.find(g => g.key === state.group) || groups[0] || null;
    }

    function renderDiscover(group, state) {
      const root = document.getElementById('discover-panel');
      if (!root || !group) return;
      const filtered = (group.players_next || []).filter(row => passesFilters(row, state)).slice(0, 8);
      if (!filtered.length) {
        root.innerHTML = '<div class="empty">No discovery suggestions match the current filters.</div>';
        return;
      }
      root.innerHTML = `<div class="discover-grid">${filtered.map(row => `
        <div class="discover-card">
          <a href="${escapeHtml(row.player_hub_href || '#')}">
            ${playerCellHtml(row)}
            <div class="tag-row">${(row.tags || []).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}</div>
          </a>
        </div>
      `).join('')}</div>`;
    }

    function render() {
      const state = getState();
      const group = currentGroup(state);
      if (!group) return;

      const categorySelectKey = state.group === 'advanced' ? state.advanced : (state.group === 'impact' ? state.impact : state.regular);
      const categories = (group.categories || []).map(cat => {
        const filtered_rows = (cat.rows || []).filter(row => passesFilters(row, state)).slice(0, 10);
        return { ...cat, filtered_rows };
      });

      const shown = categorySelectKey ? categories.filter(c => c.key === categorySelectKey) : categories;
      document.getElementById('leaders-grid').innerHTML = shown.map(buildCategoryCard).join('');
      const first = shown[0] || categories[0];
      document.getElementById('qualification-text').textContent = first?.qualification_text || '';
      renderDiscover(group, state);
    }

    function populateSelect(selectId, options, includeAllLabel) {
      const el = document.getElementById(selectId);
      el.innerHTML = `<option value="">${escapeHtml(includeAllLabel)}</option>` + options.map(opt => `<option value="${escapeHtml(opt.value)}">${escapeHtml(opt.label)}</option>`).join('');
    }

    function syncCategoryVisibility(groupKey) {
      document.getElementById('regular-filter').parentElement.style.display = groupKey === 'regular' ? 'flex' : 'none';
      document.getElementById('advanced-filter').parentElement.style.display = groupKey === 'advanced' ? 'flex' : 'none';
      document.getElementById('impact-filter').parentElement.style.display = groupKey === 'impact' ? 'flex' : 'none';
    }

    async function init() {
      const response = await fetch(DATA_URL);
      if (!response.ok) throw new Error(`Failed to load ${DATA_URL}`);
      DATASET = await response.json();

      const groups = DATASET.groups || [];
      populateSelect('group-filter', groups.map(g => ({ value: g.key, label: g.title })), 'Choose section');
      populateSelect('team-filter', (DATASET.team_options || []).map(t => ({ value: t, label: t })), 'All teams');
      populateSelect('position-filter', (DATASET.position_options || []).map(p => ({ value: p, label: p })), 'All positions');

      const regular = groups.find(g => g.key === 'regular')?.categories || [];
      const advanced = groups.find(g => g.key === 'advanced')?.categories || [];
      const impact = groups.find(g => g.key === 'impact')?.categories || [];
      populateSelect('regular-filter', regular.map(c => ({ value: c.key, label: c.title })), 'All regular stats');
      populateSelect('advanced-filter', advanced.map(c => ({ value: c.key, label: c.title })), 'All advanced stats');
      populateSelect('impact-filter', impact.map(c => ({ value: c.key, label: c.title })), 'All per40 / on-off');

      document.getElementById('group-filter').value = 'regular';
      syncCategoryVisibility('regular');

      ['group-filter','regular-filter','advanced-filter','impact-filter','team-filter','position-filter','minutes-filter'].forEach(id => {
        document.getElementById(id).addEventListener('change', () => {
          if (id === 'group-filter') syncCategoryVisibility(document.getElementById('group-filter').value || 'regular');
          render();
        });
      });

      render();
    }

    init().catch(err => {
      document.getElementById('leaders-grid').innerHTML = `<div class="card"><div class="card-head"><div class="card-title">Load error</div></div><div class="card-body" style="color:var(--muted);">${escapeHtml(err.message || 'Unknown error')}</div></div>`;
      console.error(err);
    });
  </script>
</body>
</html>
