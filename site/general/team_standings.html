<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Team Standings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg:#0f172a; --panel:#111827; --panel-2:#1f2937; --panel-3:#0b1220;
      --text:#e5e7eb; --muted:#94a3b8; --line:#334155; --line-soft:rgba(148,163,184,.14);
      --accent:#38bdf8; --good:#4ade80; --bad:#fca5a5; --warn:#f59e0b;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial, Helvetica, sans-serif; background:linear-gradient(180deg,#081120 0%, var(--bg) 16%, var(--bg) 100%); color:var(--text); }
    .wrap { max-width:1720px; margin:0 auto; padding:20px; }
    h1 { margin:0 0 6px 0; font-size:32px; line-height:1.05; letter-spacing:-.02em; }
    .subtitle { color:var(--muted); margin-bottom:16px; font-size:14px; max-width:960px; }
    .cards-grid { display:grid; grid-template-columns:repeat(4, minmax(0,1fr)); gap:12px; margin-bottom:14px; }
    .summary-card { background:rgba(17,24,39,.94); border:1px solid var(--line); border-radius:16px; padding:14px 16px; box-shadow:0 10px 24px rgba(2,6,23,.12); }
    .summary-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px; }
    .summary-value { font-size:22px; font-weight:700; line-height:1.1; }
    .summary-sub { font-size:12px; color:var(--muted); margin-top:6px; line-height:1.4; }
    .card { background:rgba(17,24,39,.94); border:1px solid var(--line); border-radius:18px; overflow:hidden; box-shadow:0 10px 26px rgba(2,6,23,.14); }
    .section-head { padding:14px 16px; border-bottom:1px solid var(--line); }
    .tabs { display:flex; flex-wrap:wrap; gap:8px; }
    .tab-btn { appearance:none; border:1px solid var(--line); background:var(--panel-3); color:var(--text); border-radius:999px; padding:8px 12px; font-size:12px; font-weight:700; cursor:pointer; }
    .tab-btn.active { background:rgba(56,189,248,.12); border-color:rgba(56,189,248,.24); color:var(--accent); }
    .table-wrap { overflow:auto; }
    table { width:100%; border-collapse:collapse; min-width:1220px; }
    th, td { padding:11px 12px; border-bottom:1px solid var(--line-soft); white-space:nowrap; font-size:13px; text-align:right; vertical-align:middle; }
    th:first-child, td:first-child, th:nth-child(2), td:nth-child(2) { text-align:left; }
    thead th { position:sticky; top:0; z-index:1; background:var(--panel-2); }
    tbody tr:hover { background:rgba(255,255,255,.015); }
    tbody tr.rank-top { background:linear-gradient(90deg, rgba(56,189,248,.06), rgba(56,189,248,0)); }
    tbody tr.rank-bottom { background:linear-gradient(90deg, rgba(248,113,113,.05), rgba(248,113,113,0)); }
    .rank-cell { font-weight:700; }
    .team-link { color:inherit; text-decoration:none; font-weight:700; }
    .team-link:hover { text-decoration:underline; }
    .team-sub { font-size:12px; color:var(--muted); margin-top:2px; }
    .record-line { font-size:12px; color:var(--muted); margin-top:4px; }
    .last5-stack { display:flex; flex-direction:column; gap:8px; align-items:flex-end; }
    .last5-record { font-size:12px; font-weight:700; color:var(--text); }
    .last5-pills { display:flex; gap:4px; }
    .form-pill { display:inline-flex; align-items:center; justify-content:center; min-width:24px; height:24px; border-radius:999px; font-size:11px; font-weight:700; border:1px solid var(--line); }
    .form-pill.win { background:rgba(74,222,128,.14); color:var(--good); }
    .form-pill.loss { background:rgba(252,165,165,.14); color:var(--bad); }
    .form-pill.tie { background:rgba(148,163,184,.16); color:#e2e8f0; }
    .pos { color:var(--good); font-weight:700; }
    .neg { color:var(--bad); font-weight:700; }
    @media (max-width: 1100px) { .cards-grid { grid-template-columns:repeat(2, minmax(0,1fr)); } }
    @media (max-width: 720px) { .wrap { padding:14px; } .cards-grid { grid-template-columns:1fr; } }
  </style>
</head>

    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function fmtNum(v, digits=1) {
      return (v === null || v === undefined || Number.isNaN(Number(v))) ? "—" : Number(v).toFixed(digits);
    }

    function fmtPct(v) {
      return (v === null || v === undefined || Number.isNaN(Number(v))) ? "—" : (Number(v) * 100).toFixed(1) + "%";
    }

    function fmtDiff(v) {
      if (v === null || v === undefined || Number.isNaN(Number(v))) return "—";
      const n = Number(v);
      const cls = n > 0 ? "pos" : (n < 0 ? "neg" : "");
      const prefix = n > 0 ? "+" : "";
      return `<span class="${cls}">${prefix}${n.toFixed(1)}</span>`;
    }

    function renderLast5(text, wins=null, losses=null) {
      const chars = String(text || "").trim().split("").filter(Boolean);
      const pills = chars.map(ch => {
        const up = ch.toUpperCase();
        const cls = up === "W" ? "win" : (up === "L" ? "loss" : "tie");
        return `<span class="form-pill ${cls}">${escapeHtml(up)}</span>`;
      }).join("");
      const record = (wins !== null && losses !== null) ? `${wins}-${losses}` : "";
      return `<div class="last5-stack"><div class="last5-record">${escapeHtml(record)}</div><div class="last5-pills">${pills}</div></div>`;
    }

    function teamCell(row, section) {
      const name = escapeHtml(row.team_name || "");
      const key = escapeHtml(row.team_key || "");
      const href = row.team_hub_href ? escapeHtml(row.team_hub_href) : "";
      const team = href ? `<a class="team-link" href="${href}">${name}</a>` : name;
      let sub = `<div class="team-sub">${key}</div>`;
      if (section === "home") {
        sub += `<div class="record-line">Home: ${Math.round(Number(row.home_wins || 0))}-${Math.round(Number(row.home_losses || 0))}</div>`;
      } else if (section === "away") {
        sub += `<div class="record-line">Away: ${Math.round(Number(row.away_wins || 0))}-${Math.round(Number(row.away_losses || 0))}</div>`;
      } else if (section === "last5") {
        sub += `<div class="record-line">Last 5: ${Math.round(Number(row.last5_wins || 0))}-${Math.round(Number(row.last5_losses || 0))}</div>`;
      }
      return `${team}${sub}`;

          `<span class="rank-cell">${Math.round(Number(row.rank || 0))}</span>`,
          teamCell(row, "last5"),
          Math.round(Number(row.last5_games || 0)),
          Math.round(Number(row.last5_wins || 0)),
          Math.round(Number(row.last5_losses || 0)),
          fmtPct(row.last5_win_pct),
          fmtDiff(row.last5_point_diff),
          fmtNum(row.off_rating),
          fmtNum(row.def_rating),
          fmtDiff(row.net_rating),
          fmtNum(row.pace),
          renderLast5(row.last5, Math.round(Number(row.last5_wins || 0)), Math.round(Number(row.last5_losses || 0))),
        ],
      },
    };

    function sectionSorter(section) {
      if (section === "home") {
        return (a, b) =>
          (Number(b.home_win_pct || -1) - Number(a.home_win_pct || -1)) ||
          (Number(b.home_wins || -1) - Number(a.home_wins || -1)) ||
          (Number(b.home_point_diff || -999) - Number(a.home_point_diff || -999)) ||
          (Number(b.net_rating || -999) - Number(a.net_rating || -999)) ||
          String(a.team_name || "").localeCompare(String(b.team_name || ""));
      }
      if (section === "away") {
        return (a, b) =>
          (Number(b.away_win_pct || -1) - Number(a.away_win_pct || -1)) ||
          (Number(b.away_wins || -1) - Number(a.away_wins || -1)) ||
          (Number(b.away_point_diff || -999) - Number(a.away_point_diff || -999)) ||
          (Number(b.net_rating || -999) - Number(a.net_rating || -999)) ||
          String(a.team_name || "").localeCompare(String(b.team_name || ""));
      }
      if (section === "last5") {
        return (a, b) =>
          (Number(b.last5_win_pct || -1) - Number(a.last5_win_pct || -1)) ||
          (Number(b.last5_wins || -1) - Number(a.last5_wins || -1)) ||
          (Number(b.last5_point_diff || -999) - Number(a.last5_point_diff || -999)) ||
          (Number(b.net_rating || -999) - Number(a.net_rating || -999)) ||
          String(a.team_name || "").localeCompare(String(b.team_name || ""));
      }
      return (a, b) => Number(a.rank || 999) - Number(b.rank || 999);
    }

    function renderSummaryCards() {
      const leader = STANDINGS.slice().sort((a,b) => Number(a.rank || 999) - Number(b.rank || 999))[0];
      const bestOff = STANDINGS.slice().sort((a,b) => Number(b.off_rating || -999) - Number(a.off_rating || -999))[0];
      const bestDef = STANDINGS.slice().sort((a,b) => Number(a.def_rating || 999) - Number(b.def_rating || 999))[0];
      const hottest = STANDINGS.slice().sort((a,b) =>
        (Number(b.last5_win_pct || -1) - Number(a.last5_win_pct || -1)) ||
        (Number(b.last5_point_diff || -999) - Number(a.last5_point_diff || -999))
      )[0];

      const cards = [
        {
          label: "League leader",
          value: leader ? escapeHtml(leader.team_name || "") : "—",
          sub: leader ? `#${Math.round(Number(leader.rank || 0))} · ${Math.round(Number(leader.wins || 0))}-${Math.round(Number(leader.losses || 0))} · ${fmtPct(leader.win_pct)}` : "No data"
        },
        {
          label: "Best offense",
          value: bestOff ? escapeHtml(bestOff.team_name || "") : "—",
          sub: bestOff ? `OffRtg ${fmtNum(bestOff.off_rating)} · NetRtg ${fmtDiff(bestOff.net_rating)}` : "No data"
        },
        {
          label: "Best defense",
          value: bestDef ? escapeHtml(bestDef.team_name || "") : "—",
          sub: bestDef ? `DefRtg ${fmtNum(bestDef.def_rating)} · Diff ${fmtDiff(bestDef.point_diff)}` : "No data"
        },
        {
          label: "Hottest recent team",
          value: hottest ? escapeHtml(hottest.team_name || "") : "—",
          sub: hottest ? `Last 5: ${Math.round(Number(hottest.last5_wins || 0))}-${Math.round(Number(hottest.last5_losses || 0))} · Diff ${fmtDiff(hottest.last5_point_diff)}` : "No data"
        },
      ];

      document.getElementById("summary-cards").innerHTML = cards.map(card => `
        <div class="summary-card">
          <div class="summary-label">${card.label}</div>
          <div class="summary-value">${card.value}</div>
          <div class="summary-sub">${card.sub}</div>
        </div>
      `).join("");
    }

    function renderTable(section) {
      const config = SECTION_CONFIG[section] || SECTION_CONFIG.overall;
      const rows = STANDINGS.slice().sort(sectionSorter(section));
      const head = document.getElementById("standings-head");
      const body = document.getElementById("standings-body");

      head.innerHTML = `<tr>${config.headers.map(h => `<th>${escapeHtml(h)}</th>`).join("")}</tr>`;
      body.innerHTML = rows.map((row, idx) => {
        const cls = idx < 4 ? "rank-top" : (idx >= rows.length - 2 ? "rank-bottom" : "");
        return `<tr class="${cls}">${config.row(row).map(cell => `<td>${cell}</td>`).join("")}</tr>`;
      }).join("");
    }

    function bindTabs() {
      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tab-btn").forEach(x => x.classList.remove("active"));
          btn.classList.add("active");
          renderTable(btn.dataset.section || "overall");
        });
      });
    }

    renderSummaryCards();
    bindTabs();
    renderTable("overall");
  </script>
</body>
</html>
