<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Team Standings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg:#0f172a; --panel:#111827; --panel-2:#1f2937; --panel-3:#0b1220;
      --text:#e5e7eb; --muted:#94a3b8; --line:#334155; --accent:#38bdf8;
      --good:#4ade80; --bad:#fca5a5;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial, Helvetica, sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:1720px; margin:0 auto; padding:18px; }
    h1 { margin:0 0 6px 0; font-size:26px; }
    .subtitle { color:var(--muted); margin-bottom:14px; font-size:13px; max-width:980px; }
    .toolbar { display:flex; flex-wrap:wrap; gap:12px; align-items:end; margin-bottom:14px; background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:12px; }
    .control { display:flex; flex-direction:column; gap:4px; min-width:220px; }
    .control label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
    .control select { background:var(--panel-3); color:var(--text); border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:14px; }
    .status { margin-left:auto; color:var(--muted); font-size:12px; padding-bottom:6px; }
    .summary-grid { display:grid; grid-template-columns:repeat(4, minmax(0,1fr)); gap:12px; margin-bottom:14px; }
    .summary-card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:14px; }
    .summary-label { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.04em; margin-bottom:8px; }
    .summary-title { font-size:18px; font-weight:700; line-height:1.2; }
    .summary-sub { color:var(--muted); font-size:12px; margin-top:6px; line-height:1.45; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; overflow:hidden; }
    .table-wrap { overflow:auto; }
    table { width:100%; border-collapse:collapse; min-width:1280px; }
    th, td { padding:10px 12px; border-bottom:1px solid var(--line); white-space:nowrap; font-size:13px; text-align:right; vertical-align:middle; }
    th:first-child, td:first-child, th:nth-child(2), td:nth-child(2), th:nth-child(3), td:nth-child(3) { text-align:left; }
    thead th { position:sticky; top:0; z-index:1; background:var(--panel-2); }
    tbody tr.row-top4 td:first-child { border-left:3px solid rgba(74,222,128,0.85); }
    tbody tr.row-bottom td:first-child { border-left:3px solid rgba(248,113,113,0.75); }
    .team-link { color:inherit; text-decoration:none; font-weight:700; }
    .team-link:hover { text-decoration:underline; }
    .team-sub { font-size:12px; color:var(--muted); margin-top:2px; }
    .split-badge { display:inline-flex; align-items:center; padding:5px 9px; border-radius:999px; border:1px solid var(--line); background:var(--panel-3); color:var(--text); font-size:11px; font-weight:700; }
    .form-stack { display:flex; align-items:center; gap:10px; }
    .last5-record { font-weight:700; font-size:12px; min-width:30px; }
    .form-row { display:flex; align-items:center; flex-wrap:wrap; }
    .form-pill { display:inline-flex; align-items:center; justify-content:center; min-width:24px; height:24px; border-radius:999px; font-size:11px; font-weight:700; margin-right:4px; border:1px solid var(--line); }
    .form-pill.win { background:rgba(74, 222, 128, 0.14); color:var(--good); }
    .form-pill.loss { background:rgba(252, 165, 165, 0.14); color:var(--bad); }
    .form-pill.tie { background:rgba(148, 163, 184, 0.14); color:var(--muted); }
    .section-note { color:var(--muted); font-size:12px; margin-top:10px; }
    @media (max-width: 1200px) {
      .summary-grid { grid-template-columns:repeat(2, minmax(0,1fr)); }
      .status { margin-left:0; width:100%; }
    }
    @media (max-width: 720px) {
      .summary-grid { grid-template-columns:1fr; }
      .wrap { padding:14px; }
    }
  </style>
</head>

    function escapeHtml(text) {
      return String(text ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;');
    }

    function fmtNum(v, digits=1) {
      return (v === null || v === undefined || Number.isNaN(v)) ? '—' : Number(v).toFixed(digits);
    }

    function fmtPct(v) {
      return (v === null || v === undefined || Number.isNaN(v)) ? '—' : (Number(v) * 100).toFixed(1) + '%';
    }

    function renderLast5(seq, record='') {
      const pills = String(seq || '').split('').filter(Boolean).map(ch => {
        const up = ch.toUpperCase();
        const cls = up === 'W' ? 'win' : (up === 'L' ? 'loss' : 'tie');
        return `<span class="form-pill ${cls}">${escapeHtml(up)}</span>`;
      }).join('');
      return `<div class="form-stack"><span class="last5-record">${escapeHtml(record || '')}</span><div class="form-row">${pills}</div></div>`;
    }

    function sectionTitle(section) {
      const map = {
        overall: 'Overall standings',
        home: 'Home record',
        away: 'Away record',
        last5: 'Last 5 games',
        halftime: 'Ahead / Behind at Halftime',
        quarters: 'Quarter-result splits'
      };
      return map[section] || 'Standings';
    }

    function sectionNote(section, split) {
      if (section === 'halftime') return `Showing final W-L record only in games where teams were ${split.toLowerCase()}.`;
      if (section === 'quarters') return `Showing final W-L record only in games where teams ${split.toLowerCase()}.`;
      if (section === 'home') return 'Home-only standings built from the same real game results layer.';
      if (section === 'away') return 'Away-only standings built from the same real game results layer.';
      if (section === 'last5') return 'Form table limited to each team’s five most recent games.';
      return 'Overall standings with team ratings and pace kept visible for context.';
    }

    function getSectionRows(section, split='') {
      const rows = PAYLOADS[section] || [];
      if (!split) return rows;
      return rows.filter(r => String(r.split_label || '') === split);
    }

    function buildSubsectionOptions(section, preferred='') {
      const wrap = document.getElementById('subsection-wrap');
      const select = document.getElementById('subsection-filter');

      if (section !== 'halftime' && section !== 'quarters') {
        wrap.style.display = 'none';
        select.innerHTML = '';
        return '';
      }

      const labels = Array.from(new Set((PAYLOADS[section] || []).map(r => String(r.split_label || '')).filter(Boolean)));
      select.innerHTML = labels.map(label => `<option value="${escapeHtml(label)}">${escapeHtml(label)}</option>`).join('');
      wrap.style.display = labels.length ? 'flex' : 'none';

      const chosen = labels.includes(preferred) ? preferred : (labels[0] || '');
      if (chosen) select.value = chosen;
      return chosen;
    }

    function renderSummaryCards(rows, section, split='') {
      const root = document.getElementById('summary-grid');
      if (!rows.length) {
        root.innerHTML = '';
        return;
      }

      const leader = rows[0];
      const hottest = rows.slice().sort((a,b) => (b.win_pct - a.win_pct) || (b.point_diff - a.point_diff))[0];
      const bestNet = rows.slice().sort((a,b) => ((b.net_rating ?? -999) - (a.net_rating ?? -999)))[0];
      const fastest = rows.slice().sort((a,b) => ((b.pace ?? -999) - (a.pace ?? -999)))[0];

      const cards = [
        {
          label: section === 'overall' ? 'League leader' : sectionTitle(section),
          title: escapeHtml(leader.team_name || ''),
          sub: `${escapeHtml(leader.team_key || '')} · ${leader.wins}-${leader.losses} · ${fmtPct(leader.win_pct)}${split ? ' · ' + escapeHtml(split) : ''}`
        },
        {
          label: 'Best recent form',
          title: escapeHtml(hottest.team_name || ''),
          sub: `${escapeHtml(hottest.last5_record || '')} in last 5 · Diff ${fmtNum(hottest.point_diff)}`
        },
        {
          label: 'Best net rating',
          title: escapeHtml(bestNet.team_name || ''),
          sub: `${escapeHtml(bestNet.team_key || '')} · NetRtg ${fmtNum(bestNet.net_rating)}`
        },
        {
          label: 'Fastest pace',
          title: escapeHtml(fastest.team_name || ''),
          sub: `${escapeHtml(fastest.team_key || '')} · Pace ${fmtNum(fastest.pace)}`
        },
      ];

      root.innerHTML = cards.map(card => `
        <div class="summary-card">
          <div class="summary-label">${card.label}</div>
          <div class="summary-title">${card.title}</div>
          <div class="summary-sub">${card.sub}</div>
        </div>
      `).join('');
    }

    function renderTable(section, split='') {
      const rows = getSectionRows(section, split);
      const body = document.getElementById('standings-body');
      const splitHead = document.getElementById('split-head');
      const rankHead = document.getElementById('rank-head');
      const status = document.getElementById('page-status');
      const note = document.getElementById('section-note');

      renderSummaryCards(rows, section, split);

      const showSplit = section === 'halftime' || section === 'quarters';
      splitHead.style.display = showSplit ? '' : 'none';
      rankHead.textContent = showSplit ? 'Base' : '#';

      status.textContent = split ? `${sectionTitle(section)} · ${split}` : sectionTitle(section);
      note.textContent = sectionNote(section, split);

      body.innerHTML = rows.map((row, idx) => {
        const team = row.team_hub_href
          ? `<a class="team-link" href="${escapeHtml(row.team_hub_href)}">${escapeHtml(row.team_name)}</a>`
          : escapeHtml(row.team_name);

        const splitCell = showSplit ? `<td><span class="split-badge">${escapeHtml(row.split_label || '')}</span></td>` : '';
        const rowClass = idx < 4 ? 'row-top4' : (idx >= rows.length - 2 ? 'row-bottom' : '');

        return `<tr class="${rowClass}">
          <td>${showSplit ? escapeHtml(String(row.rank ?? '')) : escapeHtml(String(row.section_rank ?? idx + 1))}</td>
          <td>${team}<div class="team-sub">${escapeHtml(row.team_key || '')}</div></td>
          ${splitCell}
          <td>${escapeHtml(String(row.games ?? 0))}</td>
          <td>${escapeHtml(String(row.wins ?? 0))}</td>
          <td>${escapeHtml(String(row.losses ?? 0))}</td>
          <td>${fmtPct(row.win_pct)}</td>
          <td>${fmtNum(row.point_diff)}</td>
          <td>${fmtNum(row.off_rating)}</td>
          <td>${fmtNum(row.def_rating)}</td>
          <td>${fmtNum(row.net_rating)}</td>
          <td>${fmtNum(row.pace)}</td>
          <td>${renderLast5(row.last5, row.last5_record)}</td>
        </tr>`;
      }).join('');
    }

    function syncView() {
      const section = document.getElementById('section-filter').value || 'overall';
      let split = '';

      if (section === 'halftime' || section === 'quarters') {
        const current = document.getElementById('subsection-filter').value || '';
        split = buildSubsectionOptions(section, current);
      } else {
        buildSubsectionOptions(section);
      }

      renderTable(section, split);
    }

    document.getElementById('section-filter').addEventListener('change', syncView);
    document.getElementById('subsection-filter').addEventListener('change', syncView);

    syncView();
  </script>
