<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>League Game Context Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { --bg:#0f172a; --panel:#111827; --panel2:#1f2937; --text:#e5e7eb; --muted:#94a3b8; --line:#334155; --accent:#38bdf8; --neg:#fca5a5; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial,Helvetica,sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:1700px; margin:0 auto; padding:24px; }
    h1 { margin:0 0 8px 0; font-size:28px; }
    .subtitle { color:var(--muted); margin-bottom:18px; }
    .toolbar { display:flex; flex-wrap:wrap; gap:10px; align-items:end; margin-bottom:18px; background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:12px; }
    .control { display:flex; flex-direction:column; gap:4px; min-width:170px; }
    .control label { font-size:12px; color:var(--muted); }
    .control select { background:#0b1220; color:var(--text); border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:13px; width:100%; }
    .summary-status { color:var(--muted); font-size:12px; margin-left:auto; }
    .card,.chart-card,.summary-card { background:var(--panel); border:1px solid var(--line); border-radius:16px; overflow:hidden; margin-bottom:18px; }
    .chart-card,.summary-card { padding:16px; }
    .summary-header { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .summary-logo { width:38px; height:38px; object-fit:contain; background:white; border-radius:50%; flex:0 0 auto; }
    .summary-team-name { font-size:20px; font-weight:700; }
    .summary-team-meta { color:var(--muted); font-size:13px; margin-top:2px; }
    .summary-grid { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:12px; }
    .metric-card { background:#0b1220; border:1px solid var(--line); border-radius:12px; padding:12px; }
    .metric-label { color:var(--muted); font-size:12px; margin-bottom:6px; }
    .metric-value { font-size:22px; font-weight:700; }
    .chart-header { margin-bottom:10px; display:flex; justify-content:space-between; gap:12px; align-items:end; flex-wrap:wrap; }
    .chart-title { font-size:18px; font-weight:700; }
    .chart-subtitle { color:var(--muted); font-size:13px; margin-top:4px; }
    .chart-wrap { position:relative; width:100%; overflow:auto; }
    #game-scatter, #timeline-chart { width:100%; min-width:980px; height:auto; display:block; background:linear-gradient(180deg,rgba(255,255,255,0.01),rgba(255,255,255,0.00)); border-radius:12px; }
    .tooltip { position:absolute; pointer-events:none; opacity:0; transform:translate(-50%,calc(-100% - 12px)); background:rgba(15,23,42,0.96); color:var(--text); border:1px solid var(--line); border-radius:10px; padding:8px 10px; font-size:12px; line-height:1.35; white-space:nowrap; box-shadow:0 10px 24px rgba(0,0,0,0.25); z-index:20; }
    .legend { display:flex; flex-wrap:wrap; gap:14px; margin-top:10px; color:var(--muted); font-size:12px; }
    .legend-item { display:flex; align-items:center; gap:6px; }
    .legend-swatch { width:14px; height:3px; border-radius:999px; }
    .table-wrap { overflow:auto; }
    table { width:100%; border-collapse:collapse; min-width:1300px; }
    th, td { padding:12px 14px; border-bottom:1px solid var(--line); text-align:right; white-space:nowrap; font-size:14px; }
    thead th { position:sticky; top:0; background:var(--panel2); z-index:2; font-weight:700; }
    thead th.sortable { cursor:pointer; user-select:none; }
    thead th.sortable:hover { color:var(--accent); }
    thead th.sortable::after { content:" ↕"; color:var(--muted); font-weight:400; }
    thead th.sorted-asc::after { content:" ↑"; color:var(--accent); }
    thead th.sorted-desc::after { content:" ↓"; color:var(--accent); }
    tbody tr:hover { background:rgba(56,189,248,0.08); }
    .sticky-left { position:sticky; left:0; z-index:1; text-align:left; background:var(--panel); }
    thead .sticky-left { z-index:3; background:var(--panel2); }
    .team-col { min-width:220px; }
    .opp-col { min-width:180px; }
    .team-cell { display:flex; align-items:center; gap:10px; }
    .team-avatar { width:28px; height:28px; object-fit:contain; border-radius:50%; background:white; flex:0 0 auto; }
    .team-meta, .opp-meta { display:flex; flex-direction:column; gap:2px; }
    .team-name { font-weight:700; color:var(--text); line-height:1.1; }
    .team-key, .opp-sub { font-size:12px; color:var(--muted); line-height:1.1; }
    .opp-name { font-weight:700; color:var(--text); line-height:1.1; }
    .neg { color:var(--neg); font-weight:700; }
    .axis-label { fill:var(--muted); font-size:14px; font-weight:700; }
    .axis-tick { fill:var(--muted); font-size:11px; }
    .grid-line { stroke:rgba(148,163,184,0.22); stroke-width:1; }
    .avg-line { stroke:rgba(56,189,248,0.65); stroke-width:1.5; stroke-dasharray:6 6; }
    .plot-frame { stroke:var(--line); fill:none; stroke-width:1.2; }
    .series-a { stroke:#38bdf8; fill:none; stroke-width:2.5; }
    .series-b { stroke:#f59e0b; fill:none; stroke-width:2.5; }
    .point-a { fill:#38bdf8; }
    .point-b { fill:#f59e0b; }
    @media (max-width:1200px) { .summary-grid { grid-template-columns:repeat(2,minmax(0,1fr)); } }
    @media (max-width:720px) { .summary-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>League Game Context Dashboard</h1>
    <div class="subtitle">Team-focused view from the canonical game context layer</div>
    <div class="toolbar">
      <div class="control"><label for="team-filter">Team</label><select id="team-filter"><option value="ADO" selected>ADO</option><option value="CAQ">CAQ</option><option value="ESG">ESG</option><option value="FCP">FCP</option><option value="GFC">GFC</option><option value="IBC">IBC</option><option value="SCB">SCB</option><option value="SCP">SCP</option><option value="SLB">SLB</option><option value="UDO">UDO</option><option value="VGA">VGA</option><option value="VSC">VSC</option></select></div>
      <div class="control"><label for="opp-filter">Opponent</label><select id="opp-filter"><option value="">All opponents</option><option value="ADO">ADO</option><option value="CAQ">CAQ</option><option value="ESG">ESG</option><option value="FCP">FCP</option><option value="GFC">GFC</option><option value="IBC">IBC</option><option value="SCB">SCB</option><option value="SCP">SCP</option><option value="SLB">SLB</option><option value="UDO">UDO</option><option value="VGA">VGA</option><option value="VSC">VSC</option></select></div>
      <div class="control"><label for="ha-filter">Home/Away</label><select id="ha-filter"><option value="">All</option><option value="Home">Home</option><option value="Away">Away</option></select></div>
      <div class="control"><label for="result-filter">Result</label><select id="result-filter"><option value="">All</option><option value="W">Wins</option><option value="L">Losses</option></select></div>
      <div class="summary-status" id="rows-summary"></div>
    </div>
    <div class="summary-card"><div id="games-summary"></div></div>
    <div class="chart-card">
      <div class="chart-header"><div><div class="chart-title">Pace vs Net Rating</div><div class="chart-subtitle">One point per game. X = Pace · Y = NetRtg</div></div></div>
      <div class="chart-wrap"><svg id="game-scatter" viewBox="0 0 980 620"></svg><div id="scatter-tooltip" class="tooltip"></div></div>
    </div>
    <div class="chart-card">
      <div class="chart-header">
        <div><div class="chart-title">Trend over time</div><div class="chart-subtitle">Real timeline using Round and GameDate</div></div>
        <div class="control" style="min-width:220px;"><label for="timeline-group">Metric group</label><select id="timeline-group"><option value="score">Points For / Against</option><option value="ratings">OffRtg / DefRtg</option><option value="efg">eFG% / Opp eFG%</option></select></div>
      </div>
      <div class="chart-wrap"><svg id="timeline-chart" viewBox="0 0 1180 560"></svg><div id="timeline-tooltip" class="tooltip"></div></div>
      <div class="legend" id="timeline-legend"></div>
    </div>
    <div class="card"><div class="table-wrap"><table id="league-table"><thead><tr id="table-head"></tr></thead><tbody id="table-body"></tbody></table></div></div>
  </div>

function renderTimeline(rows){const svg=document.getElementById("timeline-chart");const tooltip=document.getElementById("timeline-tooltip");const legend=document.getElementById("timeline-legend");if(!svg||!tooltip||!legend)return;const group=getCurrentTimelineGroup();const validRows=sortRowsForTimeline(rows).filter(r=>group.series.some(s=>r[s.key]!==null&&r[s.key]!==undefined&&!Number.isNaN(r[s.key])));if(!validRows.length){svg.innerHTML="";legend.innerHTML="";return;}const width=1180,height=560;const margin={top:30,right:30,bottom:120,left:70};const plotX=margin.left,plotY=margin.top,plotW=width-margin.left-margin.right,plotH=height-margin.top-margin.bottom;const allVals=[];group.series.forEach(s=>validRows.forEach(r=>{const v=r[s.key];if(v!==null&&v!==undefined&&!Number.isNaN(v))allVals.push(v);}));let yMin=Math.min(...allVals),yMax=Math.max(...allVals);const pad=Math.max(1.0,(yMax-yMin)*0.1);yMin-=pad;yMax+=pad;const xCount=validRows.length;function sx(index){return xCount===1?plotX+plotW/2:plotX+(index/(xCount-1))*plotW;}function sy(v){return plotY+plotH-((v-yMin)/(yMax-yMin))*plotH;}function line(x1,y1,x2,y2,cls){const el=document.createElementNS("http://www.w3.org/2000/svg","line");el.setAttribute("x1",x1);el.setAttribute("y1",y1);el.setAttribute("x2",x2);el.setAttribute("y2",y2);el.setAttribute("class",cls);return el;}function rect(x,y,w,h,cls){const el=document.createElementNS("http://www.w3.org/2000/svg","rect");el.setAttribute("x",x);el.setAttribute("y",y);el.setAttribute("width",w);el.setAttribute("height",h);el.setAttribute("class",cls);return el;}function text(x,y,v,cls,anchor="middle",rotate=null){const el=document.createElementNS("http://www.w3.org/2000/svg","text");el.setAttribute("x",x);el.setAttribute("y",y);el.setAttribute("class",cls);el.setAttribute("text-anchor",anchor);if(rotate!==null)el.setAttribute("transform","rotate("+rotate+" "+x+" "+y+")");el.textContent=v;return el;}function pathFromSeries(values){let d="";values.forEach((item,idx)=>{i
