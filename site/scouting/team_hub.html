<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Team Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --line: #334155;
      --accent: #38bdf8;
      --good: #4ade80;
      --bad: #fca5a5;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1760px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 8px 0; font-size: 28px; }
    .subtitle { color: var(--muted); margin-bottom: 18px; }
    .toolbar { display:flex; flex-wrap:wrap; gap:12px; align-items:end; margin-bottom:18px; background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:12px; }
    .control { display:flex; flex-direction:column; gap:4px; min-width:220px; }
    .control label { font-size:12px; color:var(--muted); }
    .control select { background:#0b1220; color:var(--text); border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:13px; }
    .status { color:var(--muted); font-size:12px; margin-left:auto; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; overflow:hidden; margin-bottom:18px; }
    .section-head { padding:14px 16px; border-bottom:1px solid var(--line); font-size:18px; font-weight:700; }
    .section-body { padding:16px; }
    .hero { display:grid; grid-template-columns: 320px 1fr; gap:18px; }
    .team-hero { display:flex; gap:14px; align-items:center; }
    .team-logo { width:72px; height:72px; border-radius:50%; object-fit:contain; background:white; flex:0 0 auto; }
    .team-name { font-size:28px; font-weight:700; }
    .team-meta { color:var(--muted); font-size:13px; margin-top:6px; }
    .summary-grid { display:grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap:12px; }
    .metric-card { background:#0b1220; border:1px solid var(--line); border-radius:12px; padding:12px; }
    .metric-label { color:var(--muted); font-size:12px; margin-bottom:6px; }
    .metric-value { font-size:22px; font-weight:700; }
    .metric-sub { font-size:12px; color:var(--muted); margin-top:4px; }
    .two-col { display:grid; grid-template-columns: 1.2fr 1fr; gap:18px; }
    .three-col { display:grid; grid-template-columns: 1.2fr 1fr 1fr; gap:18px; }
    .chart-wrap { position:relative; width:100%; overflow:auto; }
    #trend-chart { width:100%; min-width:980px; height:auto; display:block; background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.00)); border-radius:12px; }
    .tooltip { position:absolute; pointer-events:none; opacity:0; transform:translate(-50%, calc(-100% - 12px)); background:rgba(15,23,42,0.96); color:var(--text); border:1px solid var(--line); border-radius:10px; padding:8px 10px; font-size:12px; line-height:1.35; white-space:nowrap; z-index:20; }
    .legend { display:flex; flex-wrap:wrap; gap:14px; margin-top:10px; color:var(--muted); font-size:12px; }
    .legend-item { display:flex; align-items:center; gap:6px; }
    .legend-swatch { width:14px; height:3px; border-radius:999px; }
    table { width:100%; border-collapse:collapse; min-width:760px; }
    th, td { padding:10px 12px; border-bottom:1px solid var(--line); font-size:13px; text-align:right; white-space:nowrap; }
    th:first-child, td:first-child { text-align:left; }
    thead th { background:var(--panel-2); position:sticky; top:0; z-index:1; }
    .table-wrap { overflow:auto; }
    .good { color:var(--good); font-weight:700; }
    .bad { color:var(--bad); font-weight:700; }
    .link-groups { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:16px; }
    .link-group { background:#0b1220; border:1px solid var(--line); border-radius:12px; padding:12px; }
    .link-group h4 { margin:0 0 10px 0; font-size:14px; }
    .link-list { display:flex; flex-direction:column; gap:8px; }
    .link-list a { color:var(--accent); text-decoration:none; }
    .link-list a:hover { text-decoration:underline; }
    .empty { color:var(--muted); font-size:13px; }
    .opp-cell { display:flex; flex-direction:column; gap:2px; }
    .opp-main { font-weight:700; }
    .opp-sub { font-size:12px; color:var(--muted); }
    .axis-label { fill:var(--muted); font-size:14px; font-weight:700; }
    .axis-tick { fill:var(--muted); font-size:11px; }
    .grid-line { stroke:rgba(148,163,184,0.22); stroke-width:1; }
    .plot-frame { stroke:var(--line); fill:none; stroke-width:1.2; }
    .series-a { stroke:#38bdf8; fill:none; stroke-width:2.5; }
    .series-b { stroke:#f59e0b; fill:none; stroke-width:2.5; }
    .point-a { fill:#38bdf8; }
    .point-b { fill:#f59e0b; }
    @media (max-width: 1300px) {
      .hero, .two-col, .three-col { grid-template-columns: 1fr; }
      .summary-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .link-groups { grid-template-columns:1fr; }
    }
    @media (max-width: 720px) {
      .summary-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Team Hub</h1>
    <div class="subtitle">Single-team scouting and analytics hub.</div>

    <div class="toolbar">
      <div class="control">
        <label for="team-filter">Team</label>
        <select id="team-filter"></select>
      </div>
      <div class="control">
        <label for="trend-metric">Trend</label>
        <select id="trend-metric">
          <option value="ratings">OffRtg / DefRtg</option>
          <option value="score">Points For / Against</option>
          <option value="shooting">eFG% / Opp eFG%</option>
        </select>
      </div>
      <div class="control">
        <label for="lineups-min-minutes">Lineups Min Minutes</label>
        <input id="lineups-min-minutes" type="number" min="0" step="1" value="20">
      </div>
      <div class="status" id="team-status"></div>
    </div>

    <div class="card">
      <div class="section-body">
        <div class="hero">
          <div id="team-hero"></div>
          <div class="summary-grid" id="summary-grid"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-head">Recent Form</div>
      <div class="section-body">
        <div class="summary-grid" id="recent-grid"></div>
      </div>
    </div>

    <div class="card">
      <div class="section-head">Team Trend</div>
      <div class="section-body">
        <div class="chart-wrap">
          <svg id="trend-chart" viewBox="0 0 1180 560" role="img" aria-label="Team trend chart"></svg>
          <div id="trend-tooltip" class="tooltip"></div>
        </div>
        <div class="legend" id="trend-legend"></div>
      </div>
    </div>

    <div class="three-col">
      <div class="card">
        <div class="section-head">Recent Games</div>
        <div class="section-body table-wrap" id="games-table"></div>
      </div>
      <div class="card">
        <div class="section-head">Best Lineups</div>
        <div class="section-body table-wrap" id="best-lineups-table"></div>
      </div>
      <div class="card">
        <div class="section-head">Worst Lineups</div>
        <div class="section-body table-wrap" id="worst-lineups-table"></div>
      </div>
    </div>

    <div class="two-col">
      <div class="card">
        <div class="section-head">Key Players</div>
        <div class="section-body table-wrap" id="players-table"></div>
      </div>
      <div class="card">
        <div class="section-head">Reports & Packs</div>
        <div class="section-body" id="links-panel"></div>
      </div>
    </div>
  </div>

    function escapeHtml(s) {

        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function fmtNumber(value) {
      if (value === null || value === undefined || Number.isNaN(value)) return "—";
      return Number(value).toFixed(1);
    }

    function fmtPct(value) {
      if (value === null || value === undefined || Number.isNaN(value)) return "—";
      return (Number(value) * 100).toFixed(1) + "%";
    }

    function avg(values) {
      const clean = values.filter(v => v !== null && v !== undefined && !Number.isNaN(v));
      if (!clean.length) return null;
      return clean.reduce((a, b) => a + b, 0) / clean.length;
    }

    function parseDate(value) {
      if (value === null || value === undefined) return null;
      const raw = String(value).trim();
      if (!raw) return null;
      const ts = Date.parse(raw);
      return Number.isNaN(ts) ? null : ts;
    }

    function gameSortKey(game) {
      const dateTs = parseDate(game.game_date);
      const roundNum = (game.round === null || game.round === undefined || Number.isNaN(Number(game.round))) ? Number.NEGATIVE_INFINITY : Number(game.round);
      const codeNum = Number(game.game_code);
      const gameCodeVal = Number.isNaN(codeNum) ? String(game.game_code || "") : codeNum;
      return { dateTs, roundNum, gameCodeVal };
    }

    function sortGamesChronologically(rows, descending=false) {
      const sorted = [...rows].sort((a,b) => {
        const ka = gameSortKey(a);
        const kb = gameSortKey(b);
        if (ka.dateTs !== null && kb.dateTs !== null && ka.dateTs !== kb.dateTs) return ka.dateTs - kb.dateTs;
        if (ka.dateTs !== null && kb.dateTs === null) return -1;
        if (ka.dateTs === null && kb.dateTs !== null) return 1;
        if (ka.roundNum !== kb.roundNum) return ka.roundNum - kb.roundNum;

        return String(ka.gameCodeVal).localeCompare(String(kb.gameCodeVal));
      });

      if (!svg || !tooltip || !legend) return;

      const games = sortGamesChronologically(teamGames(teamKey));
      const metricGroup = document.getElementById("trend-metric").value;
      let series = [];
      let yLabel = "";

      if (metricGroup === "score") {
        series = [
          { key: "score", label: "PointsFor", lineClass: "series-a", pointClass: "point-a", color: "#38bdf8", pct: false },
          { key: "opp_score", label: "PointsAgainst", lineClass: "series-b", pointClass: "point-b", color: "#f59e0b", pct: false },
        ];
        yLabel = "Points";
      } else if (metricGroup === "shooting") {
        series = [
          { key: "efg_pct_off", label: "eFG%", lineClass: "series-a", pointClass: "point-a", color: "#38bdf8", pct: true },
          { key: "efg_pct_def", label: "Opp eFG%", lineClass: "series-b", pointClass: "point-b", color: "#f59e0b", pct: true },
        ];
        yLabel = "eFG%";
      } else {
        series = [
          { key: "off_rating", label: "OffRtg", lineClass: "series-a", pointClass: "point-a", color: "#38bdf8", pct: false },
          { key: "def_rating", label: "DefRtg", lineClass: "series-b", pointClass: "point-b", color: "#f59e0b", pct: false },
        ];
        yLabel = "Rating";
      }

      const values = [];
      series.forEach(s => games.forEach(g => {
        const v = g[s.key];
        if (v !== null && v !== undefined && !Number.isNaN(v)) values.push(v);
      }));
      if (!values.length) {
        svg.innerHTML = "";
        legend.innerHTML = "";
        return;
      }

      const width = 1180, height = 560;
      const margin = { top: 30, right: 30, bottom: 120, left: 70 };
      const plotX = margin.left, plotY = margin.top;
      const plotW = width - margin.left - margin.right, plotH = height - margin.top - margin.bottom;

      let yMin = Math.min(...values), yMax = Math.max(...values);
      const pad = Math.max(metricGroup === "shooting" ? 0.01 : 1.0, (yMax - yMin) * 0.1);
      yMin -= pad; yMax += pad;

      function sx(index) { return games.length <= 1 ? plotX + plotW / 2 : plotX + (index / (games.length - 1)) * plotW; }
      function sy(v) { return plotY + plotH - ((v - yMin) / (yMax - yMin)) * plotH; }
      function line(x1,y1,x2,y2,cls) {
        const el = document.createElementNS("http://www.w3.org/2000/svg", "line");
        el.setAttribute("x1", x1); el.setAttribute("y1", y1); el.setAttribute("x2", x2); el.setAttribute("y2", y2); el.setAttribute("class", cls); return el;
      }
      function rect(x,y,w,h,cls) {
        const el = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        el.setAttribute("x", x); el.setAttribute("y", y); el.setAttribute("width", w); el.setAttribute("height", h); el.setAttribute("class", cls); return el;
      }
      function text(x,y,val,cls,anchor="middle",rotate=null) {
        const el = document.createElementNS("http://www.w3.org/2000/svg", "text");
        el.setAttribute("x", x); el.setAttribute("y", y); el.setAttribute("class", cls); el.setAttribute("text-anchor", anchor);
        if (rotate !== null) el.setAttribute("transform", "rotate(" + rotate + " " + x + " " + y + ")");
        el.textContent = val; return el;
      }

      svg.innerHTML = "";
      legend.innerHTML = "";

      for (let i=0; i<=5; i++) {
        const yVal = yMin + ((yMax - yMin) * i / 5);
        const gy = sy(yVal);
        svg.appendChild(line(plotX, gy, plotX + plotW, gy, "grid-line"));
        svg.appendChild(text(plotX - 10, gy + 4, metricGroup === "shooting" ? (yVal*100).toFixed(1) + "%" : yVal.toFixed(1), "axis-tick", "end"));
      }

      games.forEach((g, idx) => {
        const x = sx(idx);
        svg.appendChild(line(x, plotY, x, plotY + plotH, "grid-line"));
        svg.appendChild(text(x, plotY + plotH + 18, g.game_date || "", "axis-tick"));
        svg.appendChild(text(x, plotY + plotH + 40, "R" + String(g.round ?? "—"), "axis-tick"));
      });

      svg.appendChild(rect(plotX, plotY, plotW, plotH, "plot-frame"));
      svg.appendChild(text(plotX + plotW/2, height - 12, "Games by date", "axis-label"));
      svg.appendChild(text(18, plotY + plotH/2, yLabel, "axis-label", "middle", -90));

      series.forEach(s => {
        let d = "";
        games.forEach((g, idx) => {
          const v = g[s.key];
          if (v === null || v === undefined || Number.isNaN(v)) return;
          const x = sx(idx), y = sy(v);
          d += (d ? " L " : "M ") + x + " " + y;
        });
        if (d) {
          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("d", d);
          path.setAttribute("class", s.lineClass);
          svg.appendChild(path);
        }
        games.forEach((g, idx) => {
          const v = g[s.key];
          if (v === null || v === undefined || Number.isNaN(v)) return;
          const cx = sx(idx), cy = sy(v);
          const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          dot.setAttribute("cx", cx); dot.setAttribute("cy", cy); dot.setAttribute("r", 4.5); dot.setAttribute("class", s.pointClass); svg.appendChild(dot);

          const hit = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          hit.setAttribute("cx", cx); hit.setAttribute("cy", cy); hit.setAttribute("r", 12); hit.setAttribute("fill", "transparent"); hit.style.cursor = "pointer"; svg.appendChild(hit);
          hit.addEventListener("mouseenter", evt => {
            const rect = svg.getBoundingClientRect();
            tooltip.style.opacity = "1";
            tooltip.style.left = (evt.clientX - rect.left) + "px";
            tooltip.style.top = (evt.clientY - rect.top) + "px";
            tooltip.innerHTML = `<strong>${escapeHtml(g.opponent_name)}</strong><br>${escapeHtml(g.home_away)} · ${escapeHtml(g.result)} · R${g.round ?? "—"}<br>${escapeHtml(g.game_date || "")}<br>${escapeHtml(s.label)}: ${s.pct ? fmtPct(v) : fmtNumber(v)}`;
          });
          hit.addEventListener("mousemove", evt => {
            const rect = svg.getBoundingClientRect();
            tooltip.style.left = (evt.clientX - rect.left) + "px";
            tooltip.style.top = (evt.clientY - rect.top) + "px";
          });
          hit.addEventListener("mouseleave", () => tooltip.style.opacity = "0");
        });
        const item = document.createElement("div");
        item.className = "legend-item";
        item.innerHTML = `<span class="legend-swatch" style="background:${s.color}"></span><span>${escapeHtml(s.label)}</span>`;
        legend.appendChild(item);
      });
    }

    function refresh() {
      const team = currentTeam();
      if (!team) return;
      const games = teamGames(team.team_key);
      const players = teamPlayers(team.team_key).sort((a,b) => (b.mpg ?? -Infinity) - (a.mpg ?? -Infinity)).slice(0, TOP_PLAYERS_COUNT);
      const lineups = teamLineups(team.team_key).sort((a,b) => (b.net_rating ?? -Infinity) - (a.net_rating ?? -Infinity));
      const bestLineups = lineups.slice(0, TOP_LINEUPS_COUNT);
      const worstLineups = [...lineups].sort((a,b) => (a.net_rating ?? Infinity) - (b.net_rating ?? Infinity)).slice(0, TOP_LINEUPS_COUNT);
      const gamesDesc = sortGamesChronologically(games, true).slice(0, RECENT_GAMES_TO_SHOW);

      const status = document.getElementById("team-status");
      if (status) status.textContent = `${games.length} games · ${players.length} key players · ${lineups.length} lineups (min ${currentLineupsMinMinutes()} min)`;

      renderHero(team, games);
      renderSummary(games);
      renderRecentForm(team.team_key);
      renderTrend(team.team_key);
      document.getElementById("games-table").innerHTML = buildGamesTable(gamesDesc);
      document.getElementById("best-lineups-table").innerHTML = buildLineupsTable(bestLineups);
      document.getElementById("worst-lineups-table").innerHTML = buildLineupsTable(worstLineups);
      document.getElementById("players-table").innerHTML = buildPlayersTable(players);
      renderLinks(team);
    }

    const select = document.getElementById("team-filter");
    const urlParams = new URLSearchParams(window.location.search);
    const requestedTeam = (urlParams.get("team") || "").trim().toUpperCase();
    const teamKeys = new Set(TEAMS.map(t => String(t.team_key || "").trim().toUpperCase()));

    TEAMS.sort((a,b) => String(a.team_key).localeCompare(String(b.team_key))).forEach((team, idx) => {
      const opt = document.createElement("option");
      opt.value = team.team_key;
      opt.textContent = `${team.team_key} · ${team.team_name}`;
      if ((requestedTeam && String(team.team_key).toUpperCase() === requestedTeam) || (!requestedTeam && idx === 0)) {
        opt.selected = true;
      }
      select.appendChild(opt);
    });

    if (requestedTeam && teamKeys.has(requestedTeam)) {
      select.value = requestedTeam;
    }

    select.addEventListener("change", () => {
      const next = (select.value || "").trim();
      const nextUrl = new URL(window.location.href);
      if (next) {
        nextUrl.searchParams.set("team", next);
      } else {
        nextUrl.searchParams.delete("team");
      }
      window.history.replaceState({}, "", nextUrl.toString());
      refresh();
    });
    document.getElementById("trend-metric").addEventListener("change", refresh);
    document.getElementById("lineups-min-minutes").addEventListener("input", refresh);
    refresh();
  </script>
</body>
</html>
