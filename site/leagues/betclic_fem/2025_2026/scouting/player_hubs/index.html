const teamFilter = document.getElementById("teamFilter");
const nameFilter = document.getElementById("nameFilter");
const resultsMeta = document.getElementById("resultsMeta");
const playerResults = document.getElementById("playerResults");

function escapeHtml(text) {
  return String(text ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
}

function normalizeText(text) {
  return String(text || "")
    .normalize("NFD")
    .replace(/[̀-ͯ]/g, "")
    .toLowerCase()
    .trim();
}

function renderPlayers() {
  const teamValue = teamFilter.value || "";
  const query = normalizeText(nameFilter.value || "");

  const filtered = PLAYER_ROWS.filter(row => {
    if (teamValue && row.team_key !== teamValue) return false;
    if (query) {
      const hay = normalizeText((row.player_name || "") + " " + (row.href || ""));
      if (!hay.includes(query)) return false;
    }
    return true;
  });

  resultsMeta.textContent = `Showing ${filtered.length} of ${PLAYER_ROWS.length} players`;

  if (!filtered.length) {
    playerResults.innerHTML = '<div class="empty">No players match the current filters.</div>';
    return;
  }

  playerResults.innerHTML = filtered.map(row => `
    <a class="player-card" href="${escapeHtml(row.href)}">
      <div class="player-card-head">
        <div class="player-label">Player Hub</div>
        <span class="status-dot ${Number(row.active) === 0 ? "inactive" : "active"}" title="${Number(row.active) === 0 ? "Inactive roster status" : "Active roster status"}"></span>
      </div>
      <div class="player-name">${escapeHtml(row.player_name)}</div>
      <div class="player-sub">${escapeHtml(row.team_key)}</div>
    </a>
  `).join("");
}

TEAM_OPTIONS.forEach(team => {
  const opt = document.createElement("option");
  opt.value = team;
  opt.textContent = team;
  teamFilter.appendChild(opt);
});

teamFilter.addEventListener("change", renderPlayers);
nameFilter.addEventListener("input", renderPlayers);
renderPlayers();
</script>
